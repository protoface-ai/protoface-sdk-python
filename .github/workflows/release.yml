name: Release

on:
  release:
    types: [published]

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --group dev --python 3.11

      - name: Verify tag matches package version
        run: |
          uv run python - <<'PY'
          import os
          import pathlib

          namespace = {}
          version_file = pathlib.Path("src/protoface_sdk/version.py")
          exec(version_file.read_text(), namespace)

          expected_tag = f"v{namespace['__version__']}"
          actual_tag = os.environ["GITHUB_REF_NAME"]
          if actual_tag != expected_tag:
              raise SystemExit(
                  f"release tag {actual_tag} does not match expected tag {expected_tag}"
              )
          PY

      - name: Build distributions
        run: uv build

      - name: Check distributions
        run: uv run python -m twine check dist/*

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*

  publish:
    needs: build
    runs-on: ubuntu-24.04
    environment: pypi
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
